<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folio — Insights</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/library.css">
    <link rel="stylesheet" href="../CSS/insights.css">
    <link rel="shortcut icon" href="/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="error-toast" class="error-toast"></div>

    <header class="lib-topbar" id="lib-topbar">
        <div class="lib-search-wrap">
            <h2 style="font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.25rem; color: var(--text-primary); margin: 0; padding-left: 12px;">Insights Dashboard</h2>
        </div>
        <div class="lib-topbar-divider"></div>
        <div class="lib-topbar-actions">
            <button class="lib-icon-btn" id="btn-home" title="Back to Library">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </button>
            <button class="lib-icon-btn" id="btn-theme" title="Toggle theme">
                <svg id="theme-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg id="theme-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </header>

    <main class="insights-main" id="insights-main" style="display: none;">
        <!-- Curiosity Heatmap -->
        <section class="insights-section" id="section-heatmap">
            <h3 class="insights-section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><path d="M2 12h4l3-9 5 18 3-9h5"/></svg>
                Curiosity Heatmap
            </h3>
            <p class="heatmap-insight" id="heatmap-insight"></p>
            <div class="heatmap-list" id="heatmap-list"></div>
        </section>

        <!-- Read-Later Graveyard -->
        <section class="insights-section" id="section-graveyard">
            <h3 class="insights-section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Read-Later Graveyard
            </h3>
            <div class="graveyard-stats">
                <div class="graveyard-stat-card">
                    <div class="graveyard-stat-val" id="graveyard-topics">-</div>
                    <div class="graveyard-stat-label">Never-Finished Topics</div>
                </div>
                <div class="graveyard-stat-card">
                    <div class="graveyard-stat-val" id="graveyard-lengths">-</div>
                    <div class="graveyard-stat-label">Never-Finished Lengths</div>
                </div>
            </div>
            <ul class="graveyard-insights" id="graveyard-insights"></ul>
            <div class="graveyard-recommendation" id="graveyard-recommendation"></div>
        </section>

        <!-- Personalized Recommendations -->
        <section class="insights-section" id="section-recommendations">
            <h3 class="insights-section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                Personalized Recommendations
            </h3>
            <div class="recs-scroll-container" id="recs-list"></div>
        </section>
    </main>

    <div id="insights-loading" class="lib-loading-container" style="height: 60vh;">
        <div class="lib-spinner"></div>
        <span>Generating insights...</span>
    </div>

    <!-- ═══ LEARNING PATH MODAL ═══════════════════════════════════════════ -->
    <div class="lib-modal-backdrop" id="learning-path-modal" aria-hidden="true">
        <div class="lib-modal-box" style="max-width: 600px;">
            <button class="lib-modal-close" data-close="learning-path-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <h3 class="lib-modal-title" id="lp-title">Learning Path</h3>
            <p id="lp-desc" style="font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.5;"></p>
            
            <div id="lp-loading" style="display:none;">
                <div class="lib-loading-container">
                    <div class="lib-spinner"></div>
                    <span>Curating your learning path...</span>
                </div>
            </div>

            <div id="lp-results" style="display:none; max-height: 400px; overflow-y: auto;">
                <div id="lp-steps" style="display:flex; flex-direction:column; gap:16px;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/insights.js"></script>
</body>
</html>
