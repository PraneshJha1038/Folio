<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folio — Library</title>
    <meta name="description" content="Your personal reading library. Browse, organize, and read your books.">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/library.css">
    <link rel="shortcut icon" href="/public/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Toast -->
    <div id="error-toast" class="error-toast"></div>

    <!-- ═══ TOP BAR ═══════════════════════════════════════════════════════ -->
    <header class="lib-topbar" id="lib-topbar">
        <div class="lib-search-wrap">
            <svg class="lib-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" class="lib-search-input" id="lib-search"
                placeholder="Search in 0 books..." autocomplete="off" spellcheck="false">
        </div>

        <div class="lib-topbar-divider"></div>

        <div class="lib-topbar-actions">
            <!-- Home -->
            <button class="lib-icon-btn" id="btn-home" title="Home (Local Library)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </button>
            <!-- Add -->
            <button class="lib-icon-btn" id="btn-add" title="Add content" aria-haspopup="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <!-- Global -->
            <button class="lib-icon-btn" id="btn-global" title="Global Library">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            </button>
            <!-- Profile -->
            <button class="lib-icon-btn" id="btn-profile" title="Profile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </button>
            <!-- Theme toggle -->
            <button class="lib-icon-btn" id="btn-theme" title="Toggle theme">
                <svg id="theme-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg id="theme-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <!-- Manage Shelves -->
            <button class="lib-icon-btn" id="btn-shelves" title="Manage Shelves">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </button>
        </div>
    </header>

    <!-- ═══ ADD DROPDOWN POPOVER ══════════════════════════════════════════ -->
    <div class="lib-add-popover" id="add-popover" aria-hidden="true">
        <button class="lib-popover-row" id="pop-from-device">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>From Device</span>
        </button>
        <button class="lib-popover-row" id="pop-from-url">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span>From URL</span>
        </button>
        <button class="lib-popover-row" id="pop-from-global">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span>From Global Library</span>
        </button>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="file-input-hidden" accept=".pdf,.epub" style="display:none;">

    <!-- ═══ MAIN GRID AREA ════════════════════════════════════════════════ -->
    <main class="lib-main" id="lib-main">
        <div class="lib-grid" id="lib-grid">
            <!-- Cards injected by JS -->
        </div>
    </main>

    <!-- ═══ UPLOAD VISIBILITY MODAL (after file pick) ════════════════════ -->
    <div class="lib-modal-backdrop" id="upload-vis-modal" aria-hidden="true">
        <div class="lib-modal-box">
            <button class="lib-modal-close" data-close="upload-vis-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <h3 class="lib-modal-title">Upload File</h3>
            <p id="upload-filename" class="lib-modal-subtitle"></p>
            <div class="lib-field-group">
                <label>Visibility</label>
                <div class="lib-vis-toggle">
                    <button class="lib-vis-btn active" data-val="local">Local (Private)</button>
                    <button class="lib-vis-btn" data-val="global">Global (Public)</button>
                </div>
            </div>
            <button class="lib-primary-btn" id="btn-do-upload">Upload</button>
        </div>
    </div>

    <!-- ═══ MANAGE SHELVES MODAL ══════════════════════════════════════════ -->
    <div class="lib-modal-backdrop" id="shelves-modal" aria-hidden="true">
        <div class="lib-modal-box">
            <button class="lib-modal-close" data-close="shelves-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-right:30px;">
                <h3 class="lib-modal-title" style="margin:0;padding:0;">Manage Shelves</h3>
                <button class="lib-icon-btn" id="btn-new-shelf" title="New Shelf">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
            <div id="new-shelf-form" style="display:none;margin-bottom:16px;">
                <div style="display:flex;gap:8px;">
                    <input type="text" id="new-shelf-input" class="lib-input" placeholder="Shelf name">
                    <button class="lib-primary-btn" id="btn-save-new-shelf" style="width:auto;padding:0 1rem;">Add</button>
                </div>
            </div>
            <div class="lib-shelf-list" id="shelf-list-container">
                <!-- Shelves injected by JS -->
            </div>
        </div>
    </div>

    <!-- ═══ URL MODAL ═════════════════════════════════════════════════════ -->
    <div class="lib-modal-backdrop" id="url-modal" aria-hidden="true">
        <div class="lib-modal-box">
            <button class="lib-modal-close" data-close="url-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <h3 class="lib-modal-title">Add from URL</h3>
            <div class="lib-field-group">
                <label for="url-input">Article URL</label>
                <input type="url" id="url-input" class="lib-input" placeholder="https://example.com/article">
            </div>
            <div class="lib-field-group">
                <label>Visibility</label>
                <div class="lib-vis-toggle">
                    <button class="lib-vis-btn active" data-val="local">Local (Private)</button>
                    <button class="lib-vis-btn" data-val="global">Global (Public)</button>
                </div>
            </div>
            <button class="lib-primary-btn" id="btn-do-url">Scrape & Add</button>
        </div>
    </div>

    <!-- ═══ BOOK DETAILS MODAL ════════════════════════════════════════════ -->
    <div class="lib-modal-backdrop" id="book-details-modal" aria-hidden="true">
        <div class="lib-modal-box lib-details-box">
            <button class="lib-modal-close" data-close="book-details-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>

            <!-- Header: cover + title + author -->
            <div class="lib-details-header">
                <div class="lib-details-cover" id="detail-cover-wrap">
                    <div class="lib-details-cover-placeholder" id="detail-cover-placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    </div>
                    <img id="detail-cover-img" src="" alt="" style="display:none;">
                </div>
                <div class="lib-details-header-info">
                    <div id="detail-title-view">
                        <h2 class="lib-details-title" id="detail-title"></h2>
                        <p class="lib-details-author" id="detail-author"></p>
                    </div>
                    <div id="detail-title-edit" style="display:none;">
                        <input type="text" class="lib-input" id="edit-title-input" placeholder="Title">
                        <div style="display:flex;gap:8px;margin-top:8px;">
                            <button class="lib-secondary-btn" id="btn-upload-cover" style="flex:1;">Upload Cover Image</button>
                            <input type="file" id="cover-upload-hidden" accept="image/*" style="display:none;">
                        </div>
                        <div style="display:flex;gap:8px;margin-top:8px;">
                            <button class="lib-primary-btn" id="btn-save-title" style="flex:1;">Save</button>
                            <button class="lib-secondary-btn" id="btn-cancel-title" style="flex:1;">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action icons row -->
            <div class="lib-details-actions" id="detail-actions">
                <button class="lib-detail-icon-btn" id="btn-detail-edit" title="Edit title & cover">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="lib-detail-icon-btn lib-detail-delete-btn" id="btn-detail-delete" title="Delete" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                </button>
            </div>

            <!-- Collapsible sections -->
            <div class="lib-section" id="section-metadata">
                <button class="lib-section-header" data-target="meta-body">
                    <span>Metadata</span>
                    <svg class="lib-chevron lib-chevron-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
                </button>
                <div class="lib-section-body" id="meta-body">
                    <div class="lib-meta-grid" id="meta-grid">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <div class="lib-section" id="section-series">
                <button class="lib-section-header" data-target="series-body">
                    <span>Series</span>
                    <svg class="lib-chevron lib-chevron-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
                </button>
                <div class="lib-section-body" id="series-body">
                    <div class="lib-meta-grid" id="series-grid"></div>
                </div>
            </div>

            <div class="lib-section" id="section-desc">
                <button class="lib-section-header" data-target="desc-body">
                    <span>Description</span>
                    <svg class="lib-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="lib-section-body" id="desc-body" style="display:none;">
                    <p class="lib-description" id="detail-desc"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ PROFILE PANEL ════════════════════════════════════════════════ -->
    <div class="lib-modal-backdrop" id="profile-panel" aria-hidden="true">
        <div class="lib-modal-box">
            <button class="lib-modal-close" data-close="profile-panel">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <h3 class="lib-modal-title">Profile</h3>
            <div class="lib-field-group">
                <label for="profile-name-input">Display Name</label>
                <div style="display:flex;gap:8px;">
                    <input type="text" id="profile-name-input" class="lib-input" placeholder="Your name">
                    <button class="lib-primary-btn" id="btn-save-name" style="width:auto;padding:0 1rem;">Save</button>
                </div>
            </div>
            <div class="lib-field-group" style="margin-top:1rem;">
                <label>Email</label>
                <p id="profile-email-display" class="lib-static-value"></p>
            </div>
            <hr style="border:0;border-top:1px solid var(--lib-border);margin:1.25rem 0;">
            <div class="lib-stats-row">
                <div class="lib-stat">
                    <span class="lib-stat-val" id="stat-words">0</span>
                    <span class="lib-stat-label">Words Read</span>
                </div>
                <div class="lib-stat">
                    <span class="lib-stat-val" id="stat-time">0h</span>
                    <span class="lib-stat-label">Time Read</span>
                </div>
                <div class="lib-stat">
                    <span class="lib-stat-val" id="stat-wpm">—</span>
                    <span class="lib-stat-label">Current WPM</span>
                </div>
            </div>
            <a href="profile.html" class="lib-secondary-btn" style="display:block;text-align:center;margin-top:1rem;text-decoration:none;">Full Profile →</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/library.js"></script>
</body>
</html>
